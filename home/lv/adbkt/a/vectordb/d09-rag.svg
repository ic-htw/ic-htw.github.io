<svg viewBox="0 0 520 295" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
  </marker>
  <marker id="arrb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
  </marker>
</defs>

<!-- Phase label: Indexing -->
<rect x="10" y="28" width="500" height="110" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
<text x="18" y="44" font-size="11" fill="#2E7D32" font-weight="bold">Indexierungs-Phase (offline)</text>

<!-- Indexing boxes -->
<rect x="20" y="50" width="80" height="38" rx="4" fill="#fff" stroke="#2E7D32" stroke-width="1.5"/>
<text x="60" y="65" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Dokumente</text>
<text x="60" y="79" text-anchor="middle" font-size="9" fill="#555">PDF, Web, DB</text>
<line x1="100" y1="69" x2="112" y2="69" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="114" y="50" width="80" height="38" rx="4" fill="#fff" stroke="#2E7D32" stroke-width="1.5"/>
<text x="154" y="65" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Chunking</text>
<text x="154" y="79" text-anchor="middle" font-size="9" fill="#555">500 Tokens</text>
<line x1="194" y1="69" x2="206" y2="69" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="208" y="50" width="90" height="38" rx="4" fill="#fff" stroke="#2E7D32" stroke-width="1.5"/>
<text x="253" y="65" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Embedding</text>
<text x="253" y="79" text-anchor="middle" font-size="9" fill="#555">text-emb-3</text>
<line x1="298" y1="69" x2="310" y2="69" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="312" y="50" width="90" height="38" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="357" y="65" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">VectorDB</text>
<text x="357" y="79" text-anchor="middle" font-size="9" fill="#555">Vektor + Payload</text>

<!-- Index annotation -->
<text x="260" y="112" text-anchor="middle" font-size="10" fill="#555">Jeder Chunk wird eingebettet und mit Metadaten in der VectorDB gespeichert</text>
<text x="260" y="126" text-anchor="middle" font-size="10" fill="#888">Einmalig oder inkrementell beim Hinzufügen neuer Dokumente</text>

<!-- Phase label: Query -->
<rect x="10" y="142" width="500" height="148" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
<text x="18" y="158" font-size="11" fill="#1565C0" font-weight="bold">Abfrage-Phase (online)</text>

<!-- Query row 1 -->
<rect x="20" y="165" width="80" height="38" rx="4" fill="#fff" stroke="#1565C0" stroke-width="1.5"/>
<text x="60" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">User Query</text>
<text x="60" y="194" text-anchor="middle" font-size="9" fill="#555">"Was ist HNSW?"</text>
<line x1="100" y1="184" x2="112" y2="184" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="114" y="165" width="90" height="38" rx="4" fill="#fff" stroke="#1565C0" stroke-width="1.5"/>
<text x="159" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Embedding</text>
<text x="159" y="194" text-anchor="middle" font-size="9" fill="#555">Query-Vektor</text>
<line x1="204" y1="184" x2="216" y2="184" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="218" y="165" width="90" height="38" rx="4" fill="#fff" stroke="#1565C0" stroke-width="1.5"/>
<text x="263" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">ANN-Suche</text>
<text x="263" y="194" text-anchor="middle" font-size="9" fill="#555">Top-5 Chunks</text>
<line x1="308" y1="184" x2="320" y2="184" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="322" y="165" width="90" height="38" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
<text x="367" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">VectorDB</text>
<text x="367" y="194" text-anchor="middle" font-size="9" fill="#555">Relevante Chunks</text>

<!-- Arrow down -->
<line x1="367" y1="203" x2="367" y2="218" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Query row 2 -->
<rect x="218" y="220" width="190" height="38" rx="4" fill="#fff" stroke="#1565C0" stroke-width="1.5"/>
<text x="313" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Prompt aufbauen</text>
<text x="313" y="249" text-anchor="middle" font-size="9" fill="#555">Kontext + Query → Prompt</text>
<line x1="218" y1="239" x2="206" y2="239" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="60" y="220" width="142" height="38" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
<text x="131" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">LLM (GPT-4, Claude)</text>
<text x="131" y="249" text-anchor="middle" font-size="9" fill="#555">generiert Antwort</text>
<line x1="60" y1="239" x2="48" y2="239" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="20" y="220" width="24" height="38" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<text x="32" y="244" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="bold">↩</text>

<text x="260" y="280" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">Antwort basiert auf echten, abgerufenen Dokumenten → weniger Halluzination</text>
</svg>
