<svg viewBox="0 0 520 270" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<!-- Left panel: Cosine Similarity -->
<rect x="15" y="32" width="230" height="190" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<text x="130" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Cosine-Ähnlichkeit</text>
<!-- Coordinate axes -->
<line x1="60" y1="195" x2="220" y2="195" stroke="#555" stroke-width="1.5"/>
<line x1="60" y1="195" x2="60" y2="65" stroke="#555" stroke-width="1.5"/>
<!-- Vector A -->
<line x1="60" y1="195" x2="185" y2="90" stroke="#E53935" stroke-width="2.5"/>
<circle cx="185" cy="90" r="4" fill="#E53935"/>
<text x="190" y="87" font-size="11" fill="#E53935" font-weight="bold">A</text>
<!-- Vector B -->
<line x1="60" y1="195" x2="150" y2="75" stroke="#2E7D32" stroke-width="2.5"/>
<circle cx="150" cy="75" r="4" fill="#2E7D32"/>
<text x="136" y="72" font-size="11" fill="#2E7D32" font-weight="bold">B</text>
<!-- Angle arc -->
<path d="M 100 163 A 50 50 0 0 1 120 155" fill="none" stroke="#E65100" stroke-width="2"/>
<text x="110" y="150" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">θ</text>
<!-- Formula -->
<text x="130" y="20" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">Wertebereich: −1 bis +1</text>

<!-- Right panel: Euclidean Distance -->
<rect x="275" y="32" width="230" height="190" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="390" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Euklidische Distanz (L2)</text>
<!-- Grid dots -->
<line x1="320" y1="195" x2="480" y2="195" stroke="#555" stroke-width="1.5"/>
<line x1="320" y1="195" x2="320" y2="65" stroke="#555" stroke-width="1.5"/>
<!-- Point A -->
<circle cx="355" cy="155" r="7" fill="#E53935"/>
<text x="343" y="152" font-size="11" fill="#E53935" font-weight="bold">A</text>
<!-- Point B -->
<circle cx="455" cy="90" r="7" fill="#2E7D32"/>
<text x="460" y="88" font-size="11" fill="#2E7D32" font-weight="bold">B</text>
<!-- Distance line -->
<line x1="355" y1="155" x2="455" y2="90" stroke="#7B1FA2" stroke-width="2.5" stroke-dasharray="6,3"/>
<!-- Right angle helpers -->
<line x1="355" y1="155" x2="455" y2="155" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="455" y1="155" x2="455" y2="90" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
<text x="405" y="148" font-size="10" fill="#888">Δx</text>
<text x="460" y="128" font-size="10" fill="#888">Δy</text>
<text x="395" y="118" text-anchor="middle" font-size="12" fill="#7B1FA2" font-weight="bold">d</text>
<!-- Formula -->
<text x="390" y="20" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">Wertebereich: 0 bis ∞</text>

<!-- Bottom comparison row -->
<rect x="15" y="232" width="490" height="32" rx="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<text x="90" y="248" text-anchor="middle" font-size="11" fill="#555">Cosine: Richtung zählt</text>
<text x="90" y="260" text-anchor="middle" font-size="10" fill="#888">(Textlänge ignoriert)</text>
<text x="260" y="248" text-anchor="middle" font-size="11" fill="#555">L2: absolute Position zählt</text>
<text x="260" y="260" text-anchor="middle" font-size="10" fill="#888">(magnitudesensitiv)</text>
<text x="430" y="248" text-anchor="middle" font-size="11" fill="#555">Dot Product: Richtung + Länge</text>
<text x="430" y="260" text-anchor="middle" font-size="10" fill="#888">(normiert = Cosine)</text>
</svg>
