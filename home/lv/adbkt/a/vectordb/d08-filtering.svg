<svg viewBox="0 0 520 255" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
  </marker>
  <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
  </marker>
  <marker id="arro" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
  </marker>
</defs>
<text x="260" y="20" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">Metadaten-Filterstrategien</text>

<!-- LEFT: Pre-Filtering -->
<rect x="10" y="30" width="230" height="195" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="125" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Pre-Filtering</text>

<rect x="30" y="58" width="190" height="28" rx="4" fill="#fff" stroke="#2E7D32" stroke-width="1"/>
<text x="125" y="78" text-anchor="middle" font-size="11" fill="#333">Query + Filter-Bedingung</text>
<line x1="125" y1="86" x2="125" y2="98" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrg)"/>

<rect x="30" y="100" width="190" height="28" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<text x="125" y="120" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">1. Metadaten filtern</text>
<line x1="125" y1="128" x2="125" y2="140" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrg)"/>

<rect x="30" y="142" width="190" height="28" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<text x="125" y="162" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">2. ANN auf Subset</text>
<line x1="125" y1="170" x2="125" y2="182" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrg)"/>

<rect x="30" y="184" width="190" height="28" rx="4" fill="#fff" stroke="#2E7D32" stroke-width="1"/>
<text x="125" y="204" text-anchor="middle" font-size="11" fill="#333">Top-k Ergebnisse</text>

<text x="125" y="232" text-anchor="middle" font-size="10" fill="#2E7D32">+ exakte Einhaltung des Filters</text>
<text x="125" y="244" text-anchor="middle" font-size="10" fill="#888">− kleines Subset kann Qualität mindern</text>

<!-- RIGHT: Post-Filtering -->
<rect x="280" y="30" width="230" height="195" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
<text x="395" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Post-Filtering</text>

<rect x="300" y="58" width="190" height="28" rx="4" fill="#fff" stroke="#E65100" stroke-width="1"/>
<text x="395" y="78" text-anchor="middle" font-size="11" fill="#333">Query + Filter-Bedingung</text>
<line x1="395" y1="86" x2="395" y2="98" stroke="#E65100" stroke-width="1.5" marker-end="url(#arro)"/>

<rect x="300" y="100" width="190" height="28" rx="4" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
<text x="395" y="120" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">1. ANN auf vollem Index</text>
<line x1="395" y1="128" x2="395" y2="140" stroke="#E65100" stroke-width="1.5" marker-end="url(#arro)"/>

<rect x="300" y="142" width="190" height="28" rx="4" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
<text x="395" y="162" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">2. Filter auf Top-(k*)</text>
<line x1="395" y1="170" x2="395" y2="182" stroke="#E65100" stroke-width="1.5" marker-end="url(#arro)"/>

<rect x="300" y="184" width="190" height="28" rx="4" fill="#fff" stroke="#E65100" stroke-width="1"/>
<text x="395" y="204" text-anchor="middle" font-size="11" fill="#333">Top-k Ergebnisse (evtl. &lt; k)</text>

<text x="395" y="232" text-anchor="middle" font-size="10" fill="#E65100">+ hohe ANN-Qualität (voller Index)</text>
<text x="395" y="244" text-anchor="middle" font-size="10" fill="#888">− evtl. weniger als k Resultate</text>
</svg>
