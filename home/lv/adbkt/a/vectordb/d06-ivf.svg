<svg viewBox="0 0 520 270" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<text x="260" y="20" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">IVF-Index: Cluster-basierte Suche</text>
<!-- Background -->
<rect x="10" y="30" width="500" height="210" rx="6" fill="#FAFAFA" stroke="#ccc" stroke-width="1"/>

<!-- Cluster 1: Blue (top-left) -->
<ellipse cx="130" cy="100" rx="65" ry="50" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" opacity="0.7"/>
<polygon points="130,86 136,100 130,114 124,100" fill="#1565C0" stroke="#1565C0"/>
<text x="130" y="78" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">C₁</text>
<circle cx="100" cy="95" r="4" fill="#5C9BD6"/>
<circle cx="115" cy="112" r="4" fill="#5C9BD6"/>
<circle cx="145" cy="90" r="4" fill="#5C9BD6"/>
<circle cx="158" cy="108" r="4" fill="#5C9BD6"/>
<circle cx="105" cy="78" r="4" fill="#5C9BD6"/>
<circle cx="150" cy="122" r="4" fill="#5C9BD6"/>

<!-- Cluster 2: Green (top-right) -->
<ellipse cx="370" cy="95" rx="65" ry="48" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" opacity="0.7"/>
<polygon points="370,81 376,95 370,109 364,95" fill="#2E7D32" stroke="#2E7D32"/>
<text x="370" y="73" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">C₂</text>
<circle cx="340" cy="88" r="4" fill="#66BB6A"/>
<circle cx="358" cy="108" r="4" fill="#66BB6A"/>
<circle cx="385" cy="82" r="4" fill="#66BB6A"/>
<circle cx="395" cy="108" r="4" fill="#66BB6A"/>
<circle cx="345" cy="72" r="4" fill="#66BB6A"/>

<!-- Cluster 3: Orange (bottom) -->
<ellipse cx="250" cy="195" rx="75" ry="42" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" opacity="0.7"/>
<polygon points="250,181 256,195 250,209 244,195" fill="#E65100" stroke="#E65100"/>
<text x="250" y="165" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">C₃</text>
<circle cx="195" cy="195" r="4" fill="#FFA726"/>
<circle cx="215" cy="208" r="4" fill="#FFA726"/>
<circle cx="240" cy="185" r="4" fill="#FFA726"/>
<circle cx="265" cy="208" r="4" fill="#FFA726"/>
<circle cx="288" cy="192" r="4" fill="#FFA726"/>
<circle cx="305" cy="208" r="4" fill="#FFA726"/>

<!-- Query point -->
<circle cx="230" cy="150" r="10" fill="#E53935" stroke="#fff" stroke-width="2"/>
<text x="215" y="143" font-size="11" fill="#E53935" font-weight="bold">Q</text>

<!-- nprobe circles (2 nearest clusters) -->
<circle cx="230" cy="150" r="65" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
<circle cx="230" cy="150" r="100" fill="none" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

<!-- Distance lines to nearest centroids -->
<line x1="230" y1="150" x2="130" y2="100" stroke="#E53935" stroke-width="1.5" stroke-dasharray="5,3"/>
<line x1="230" y1="150" x2="250" y2="195" stroke="#E53935" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Legend -->
<polygon points="30,248 36,262 30,276 24,262" fill="#555" stroke="#555" transform="scale(0.5) translate(18,228)"/>
<text x="26" y="252" font-size="10" fill="#555">◆ Zentroid (k-Means)</text>
<circle cx="150" cy="249" r="5" fill="#5C9BD6"/>
<text x="158" y="253" font-size="10" fill="#555">Datenpunkte</text>
<circle cx="250" cy="249" r="8" fill="#E53935" stroke="#fff" stroke-width="1.5"/>
<text x="260" y="253" font-size="10" fill="#E53935">Query Q</text>
<text x="350" y="253" font-size="10" fill="#E53935">--- nprobe=2 Cluster</text>
</svg>
