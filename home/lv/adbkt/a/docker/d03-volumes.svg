<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="monospace, sans-serif">
  <rect width="800" height="380" fill="#f8f9fa" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Volume-Typen in Docker Compose</text>

  <!-- Named Volume -->
  <rect x="30" y="55" width="220" height="280" rx="10" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="30" y="55" width="220" height="40" rx="10" fill="#0d6efd"/>
  <rect x="30" y="75" width="220" height="20" fill="#0d6efd"/>
  <text x="140" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Named Volume</text>
  <text x="140" y="118" text-anchor="middle" font-size="12" fill="#333">volumes:</text>
  <text x="140" y="136" text-anchor="middle" font-size="12" fill="#555">  pgdata:</text>
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#6c757d">Docker verwaltet</text>
  <text x="140" y="178" text-anchor="middle" font-size="11" fill="#6c757d">Speicherort</text>
  <!-- Cylinder -->
  <ellipse cx="140" cy="240" rx="50" ry="14" fill="#cce0ff" stroke="#0d6efd" stroke-width="1.5"/>
  <rect x="90" y="226" width="100" height="40" fill="#cce0ff" stroke="#0d6efd" stroke-width="1.5"/>
  <ellipse cx="140" cy="266" rx="50" ry="14" fill="#cce0ff" stroke="#0d6efd" stroke-width="1.5"/>
  <text x="140" y="249" text-anchor="middle" font-size="10" fill="#0d3070">/var/lib/docker/</text>
  <text x="140" y="263" text-anchor="middle" font-size="10" fill="#0d3070">volumes/pgdata</text>
  <text x="140" y="310" text-anchor="middle" font-size="10" fill="#198754">Persistenz: ja</text>
  <text x="140" y="325" text-anchor="middle" font-size="10" fill="#198754">Portierbar: ja</text>

  <!-- Bind Mount -->
  <rect x="290" y="55" width="220" height="280" rx="10" fill="white" stroke="#198754" stroke-width="2"/>
  <rect x="290" y="55" width="220" height="40" rx="10" fill="#198754"/>
  <rect x="290" y="75" width="220" height="20" fill="#198754"/>
  <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Bind Mount</text>
  <text x="400" y="118" text-anchor="middle" font-size="12" fill="#333">volumes:</text>
  <text x="400" y="136" text-anchor="middle" font-size="12" fill="#555">  - ./app:/code</text>
  <text x="400" y="160" text-anchor="middle" font-size="11" fill="#6c757d">Host-Verzeichnis</text>
  <text x="400" y="178" text-anchor="middle" font-size="11" fill="#6c757d">direkt gemountet</text>
  <!-- Host folder icon -->
  <rect x="355" y="220" width="90" height="60" rx="5" fill="#d1e7dd" stroke="#198754" stroke-width="1.5"/>
  <rect x="355" y="212" width="45" height="12" rx="3" fill="#198754"/>
  <text x="400" y="245" text-anchor="middle" font-size="10" fill="#155724">./app</text>
  <text x="400" y="260" text-anchor="middle" font-size="10" fill="#155724">↕ Sync</text>
  <text x="400" y="275" text-anchor="middle" font-size="10" fill="#155724">/code</text>
  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#198754">Persistenz: ja</text>
  <text x="400" y="325" text-anchor="middle" font-size="10" fill="#ffc107">Hot Reload: ja</text>

  <!-- tmpfs -->
  <rect x="550" y="55" width="220" height="280" rx="10" fill="white" stroke="#dc3545" stroke-width="2"/>
  <rect x="550" y="55" width="220" height="40" rx="10" fill="#dc3545"/>
  <rect x="550" y="75" width="220" height="20" fill="#dc3545"/>
  <text x="660" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">tmpfs</text>
  <text x="660" y="118" text-anchor="middle" font-size="12" fill="#333">tmpfs:</text>
  <text x="660" y="136" text-anchor="middle" font-size="12" fill="#555">  - /run/secrets</text>
  <text x="660" y="160" text-anchor="middle" font-size="11" fill="#6c757d">Im RAM des Hosts</text>
  <text x="660" y="178" text-anchor="middle" font-size="11" fill="#6c757d">kein Disk-I/O</text>
  <!-- RAM icon -->
  <rect x="610" y="215" width="100" height="50" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <rect x="620" y="215" width="12" height="50" fill="#dc3545" opacity="0.4"/>
  <rect x="638" y="215" width="12" height="50" fill="#dc3545" opacity="0.4"/>
  <rect x="656" y="215" width="12" height="50" fill="#dc3545" opacity="0.4"/>
  <rect x="674" y="215" width="12" height="50" fill="#dc3545" opacity="0.4"/>
  <rect x="692" y="215" width="12" height="50" fill="#dc3545" opacity="0.4"/>
  <text x="660" y="285" text-anchor="middle" font-size="10" fill="#721c24">RAM (flüchtig)</text>
  <text x="660" y="310" text-anchor="middle" font-size="10" fill="#dc3545">Persistenz: nein</text>
  <text x="660" y="325" text-anchor="middle" font-size="10" fill="#198754">Sicherheit: hoch</text>

  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#6c757d">Named Volumes für Produktionsdaten · Bind Mounts für Entwicklung · tmpfs für Secrets/Caches</text>
</svg>
