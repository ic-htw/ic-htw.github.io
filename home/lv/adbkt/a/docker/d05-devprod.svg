<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Dev vs. Prod: Override-Strategie</text>

  <!-- Base file -->
  <rect x="280" y="50" width="240" height="120" rx="8" fill="white" stroke="#6c757d" stroke-width="2"/>
  <rect x="280" y="50" width="240" height="35" rx="8" fill="#6c757d"/>
  <rect x="280" y="70" width="240" height="15" fill="#6c757d"/>
  <text x="400" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">docker-compose.yml</text>
  <text x="400" y="104" text-anchor="middle" font-size="11" fill="#555">services, images,</text>
  <text x="400" y="120" text-anchor="middle" font-size="11" fill="#555">ports, networks,</text>
  <text x="400" y="136" text-anchor="middle" font-size="11" fill="#555">gemeinsame Basis</text>
  <text x="400" y="155" text-anchor="middle" font-size="10" fill="#6c757d">(version-controlled)</text>

  <!-- Arrow down-left -->
  <line x1="340" y1="170" x2="200" y2="230" stroke="#0d6efd" stroke-width="2" marker-end="url(#a5)"/>
  <!-- Arrow down-right -->
  <line x1="460" y1="170" x2="600" y2="230" stroke="#dc3545" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Dev override -->
  <rect x="50" y="230" width="280" height="120" rx="8" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="50" y="230" width="280" height="35" rx="8" fill="#0d6efd"/>
  <rect x="50" y="250" width="280" height="15" fill="#0d6efd"/>
  <text x="190" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="white">docker-compose.override.yml</text>
  <text x="190" y="284" text-anchor="middle" font-size="11" fill="#555">Bind Mounts (./src:/app)</text>
  <text x="190" y="300" text-anchor="middle" font-size="11" fill="#555">Debug-Ports exponiert</text>
  <text x="190" y="316" text-anchor="middle" font-size="11" fill="#555">Hot Reload aktiviert</text>
  <text x="190" y="332" text-anchor="middle" font-size="10" fill="#0d6efd">automatisch geladen</text>

  <!-- Prod override -->
  <rect x="470" y="230" width="280" height="120" rx="8" fill="white" stroke="#dc3545" stroke-width="2"/>
  <rect x="470" y="230" width="280" height="35" rx="8" fill="#dc3545"/>
  <rect x="470" y="250" width="280" height="15" fill="#dc3545"/>
  <text x="610" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="white">docker-compose.prod.yml</text>
  <text x="610" y="284" text-anchor="middle" font-size="11" fill="#555">Named Volumes</text>
  <text x="610" y="300" text-anchor="middle" font-size="11" fill="#555">Restart-Policy: always</text>
  <text x="610" y="316" text-anchor="middle" font-size="11" fill="#555">Resource Limits, Secrets</text>
  <text x="610" y="332" text-anchor="middle" font-size="10" fill="#dc3545">-f compose.yml -f compose.prod.yml</text>

  <!-- Dev label -->
  <rect x="80" y="365" width="220" height="24" rx="5" fill="#cfe2ff"/>
  <text x="190" y="381" text-anchor="middle" font-size="12" fill="#0a3880">docker compose up</text>

  <!-- Prod label -->
  <rect x="490" y="365" width="290" height="24" rx="5" fill="#f8d7da"/>
  <text x="635" y="381" text-anchor="middle" font-size="12" fill="#58151c">docker compose -f … -f ….prod.yml up</text>

  <defs>
    <marker id="a5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>
</svg>
