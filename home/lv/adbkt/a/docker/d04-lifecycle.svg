<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace, sans-serif">
  <rect width="800" height="400" fill="#f8f9fa" rx="8"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Docker Compose Lifecycle &amp; CLI-Befehle</text>

  <!-- States as rounded boxes -->
  <!-- ABSENT -->
  <rect x="30" y="80" width="130" height="50" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
  <text x="95" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c757d">absent</text>

  <!-- CREATED -->
  <rect x="230" y="80" width="130" height="50" rx="8" fill="#cfe2ff" stroke="#0d6efd" stroke-width="2"/>
  <text x="295" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d6efd">created</text>

  <!-- RUNNING -->
  <rect x="430" y="80" width="130" height="50" rx="8" fill="#d1e7dd" stroke="#198754" stroke-width="2"/>
  <text x="495" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#198754">running</text>

  <!-- STOPPED -->
  <rect x="630" y="80" width="130" height="50" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="695" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">stopped</text>

  <!-- Arrows -->
  <!-- absent -> created -->
  <line x1="160" y1="105" x2="230" y2="105" stroke="#0d6efd" stroke-width="2" marker-end="url(#a4)"/>
  <text x="195" y="98" text-anchor="middle" font-size="10" fill="#0d6efd">up --no-start</text>

  <!-- created -> running -->
  <line x1="360" y1="105" x2="430" y2="105" stroke="#198754" stroke-width="2" marker-end="url(#a4)"/>
  <text x="395" y="98" text-anchor="middle" font-size="10" fill="#198754">up / start</text>

  <!-- running -> stopped -->
  <line x1="560" y1="105" x2="630" y2="105" stroke="#856404" stroke-width="2" marker-end="url(#a4)"/>
  <text x="595" y="98" text-anchor="middle" font-size="10" fill="#856404">stop</text>

  <!-- stopped -> running -->
  <path d="M695 80 Q695 40 495 40 Q295 40 295 80" fill="none" stroke="#198754" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a4)"/>
  <text x="495" y="34" text-anchor="middle" font-size="10" fill="#198754">start</text>

  <!-- running -> absent (down) -->
  <path d="M495 130 Q495 200 295 200 Q95 200 95 130" fill="none" stroke="#dc3545" stroke-width="2" marker-end="url(#a4)"/>
  <text x="295" y="220" text-anchor="middle" font-size="10" fill="#dc3545">down (Container + Netzwerk entfernen)</text>

  <!-- Commands table -->
  <rect x="30" y="245" width="740" height="140" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="400" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Wichtige Befehle</text>

  <!-- Column headers -->
  <line x1="30" y1="278" x2="770" y2="278" stroke="#dee2e6"/>
  <text x="100" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#495057">Befehl</text>
  <text x="400" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#495057">Wirkung</text>
  <text x="650" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#495057">Nützliche Flags</text>
  <line x1="30" y1="300" x2="770" y2="300" stroke="#dee2e6"/>

  <text x="100" y="316" text-anchor="middle" font-size="11" fill="#0d6efd">docker compose up</text>
  <text x="400" y="316" text-anchor="middle" font-size="11" fill="#333">Build + Start aller Services</text>
  <text x="650" y="316" text-anchor="middle" font-size="11" fill="#555">-d, --build, --scale svc=3</text>

  <text x="100" y="333" text-anchor="middle" font-size="11" fill="#dc3545">docker compose down</text>
  <text x="400" y="333" text-anchor="middle" font-size="11" fill="#333">Stop + Container/Netzwerk entfernen</text>
  <text x="650" y="333" text-anchor="middle" font-size="11" fill="#555">-v (auch Volumes)</text>

  <text x="100" y="350" text-anchor="middle" font-size="11" fill="#198754">docker compose logs</text>
  <text x="400" y="350" text-anchor="middle" font-size="11" fill="#333">Logs aller/eines Services</text>
  <text x="650" y="350" text-anchor="middle" font-size="11" fill="#555">-f (follow), --tail=50</text>

  <text x="100" y="367" text-anchor="middle" font-size="11" fill="#6f42c1">docker compose exec</text>
  <text x="400" y="367" text-anchor="middle" font-size="11" fill="#333">Befehl in laufendem Container</text>
  <text x="650" y="367" text-anchor="middle" font-size="11" fill="#555">exec web bash</text>

  <defs>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>
</svg>
