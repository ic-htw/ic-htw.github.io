<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="350" fill="#ECEFF1"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#212121">GIN-Index für JSONB</text>

  <!-- JSONB Document -->
  <rect x="20" y="48" width="210" height="148" rx="8" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <text x="125" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">JSONB Dokument</text>
  <rect x="32" y="76" width="186" height="108" rx="5" fill="#1976D2"/>
  <text x="42" y="96" font-size="12" font-family="monospace" fill="#BBDEFB">{</text>
  <text x="50" y="113" font-size="12" font-family="monospace" fill="#FFE082">  "type"</text>
  <text x="114" y="113" font-size="12" font-family="monospace" fill="white">: "login",</text>
  <text x="50" y="130" font-size="12" font-family="monospace" fill="#FFE082">  "user"</text>
  <text x="114" y="130" font-size="12" font-family="monospace" fill="white">: "alice",</text>
  <text x="50" y="147" font-size="12" font-family="monospace" fill="#FFE082">  "ip"</text>
  <text x="86" y="147" font-size="12" font-family="monospace" fill="white">: "1.2.3.4",</text>
  <text x="50" y="164" font-size="12" font-family="monospace" fill="#FFE082">  "ok"</text>
  <text x="86" y="164" font-size="12" font-family="monospace" fill="white">: true</text>
  <text x="42" y="177" font-size="12" font-family="monospace" fill="#BBDEFB">}</text>

  <!-- Arrows from doc to index entries -->
  <line x1="230" y1="100" x2="290" y2="95" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="118" x2="290" y2="148" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="136" x2="290" y2="200" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="154" x2="290" y2="252" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#78909C"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0288D1"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4CAF50"/>
    </marker>
  </defs>

  <!-- GIN Index entries column -->
  <rect x="255" y="48" width="270" height="270" rx="8" fill="#37474F" stroke="#263238" stroke-width="2"/>
  <text x="390" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">GIN Index (Invertierter Index)</text>

  <!-- Index entry rows -->
  <rect x="268" y="76" width="244" height="28" rx="4" fill="#455A64"/>
  <text x="278" y="95" font-size="12" font-family="monospace" fill="#FFE082">"type":"login"</text>
  <text x="450" y="95" font-size="11" fill="#90A4AE">→ Posting List</text>

  <rect x="268" y="128" width="244" height="28" rx="4" fill="#455A64"/>
  <text x="278" y="147" font-size="12" font-family="monospace" fill="#FFE082">"user":"alice"</text>
  <text x="450" y="147" font-size="11" fill="#90A4AE">→ Posting List</text>

  <rect x="268" y="180" width="244" height="28" rx="4" fill="#455A64"/>
  <text x="278" y="199" font-size="12" font-family="monospace" fill="#FFE082">"ip":"1.2.3.4"</text>
  <text x="450" y="199" font-size="11" fill="#90A4AE">→ Posting List</text>

  <rect x="268" y="232" width="244" height="28" rx="4" fill="#455A64"/>
  <text x="278" y="251" font-size="12" font-family="monospace" fill="#FFE082">"ok":true</text>
  <text x="450" y="251" font-size="11" fill="#90A4AE">→ Posting List</text>

  <text x="390" y="298" text-anchor="middle" font-size="11" fill="#90A4AE">... weitere Einträge aller Dokumente ...</text>

  <!-- Posting Lists -->
  <rect x="558" y="76" width="125" height="28" rx="4" fill="#0D47A1"/>
  <text x="621" y="95" text-anchor="middle" font-size="12" fill="white">row 1, 7, 23 ...</text>

  <rect x="558" y="128" width="125" height="28" rx="4" fill="#0D47A1"/>
  <text x="621" y="147" text-anchor="middle" font-size="12" fill="white">row 1, 5, 19 ...</text>

  <rect x="558" y="180" width="125" height="28" rx="4" fill="#0D47A1"/>
  <text x="621" y="199" text-anchor="middle" font-size="12" fill="white">row 1 ...</text>

  <rect x="558" y="232" width="125" height="28" rx="4" fill="#0D47A1"/>
  <text x="621" y="251" text-anchor="middle" font-size="12" fill="white">row 1, 3, 9 ...</text>

  <!-- Arrows to posting lists -->
  <line x1="512" y1="90" x2="558" y2="90" stroke="#0288D1" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="512" y1="142" x2="558" y2="142" stroke="#0288D1" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="512" y1="194" x2="558" y2="194" stroke="#0288D1" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="512" y1="246" x2="558" y2="246" stroke="#0288D1" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Query box -->
  <rect x="20" y="218" width="210" height="80" rx="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="125" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Abfrage mit @&gt;</text>
  <text x="30" y="258" font-size="11" font-family="monospace" fill="#E8F5E9">WHERE payload @&gt;</text>
  <text x="30" y="274" font-size="11" font-family="monospace" fill="#E8F5E9">  '{"type":"login"}'</text>
  <text x="125" y="292" text-anchor="middle" font-size="11" fill="#E8F5E9">→ trifft Index-Eintrag!</text>

  <!-- Arrow from query to index -->
  <line x1="230" y1="258" x2="268" y2="90" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
</svg>
