<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="300" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#212121">JSON entpacken: jsonb_each() und jsonb_array_elements()</text>

  <!-- === TOP SECTION: jsonb_each === -->

  <!-- Source JSON object -->
  <rect x="20" y="44" width="190" height="110" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="115" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">JSON-Objekt</text>
  <text x="32" y="80" font-size="12" font-family="monospace" fill="#212121">{</text>
  <text x="40" y="97" font-size="12" font-family="monospace" fill="#0288D1"> "type": "login"</text>
  <text x="40" y="114" font-size="12" font-family="monospace" fill="#0288D1"> "user": "alice"</text>
  <text x="40" y="131" font-size="12" font-family="monospace" fill="#0288D1"> "ip": "1.2.3.4"</text>
  <text x="32" y="148" font-size="12" font-family="monospace" fill="#212121">}</text>

  <!-- Function label -->
  <rect x="225" y="82" width="145" height="30" rx="6" fill="#1565C0"/>
  <text x="298" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">jsonb_each()</text>

  <!-- Arrow -->
  <line x1="210" y1="99" x2="225" y2="97" stroke="#1565C0" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="370" y1="97" x2="385" y2="97" stroke="#1565C0" stroke-width="2" marker-end="url(#arr1)"/>

  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Result table for jsonb_each -->
  <rect x="385" y="50" width="250" height="118" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="385" y="50" width="250" height="24" rx="8" fill="#1565C0"/>
  <rect x="385" y="68" width="250" height="6" fill="#1565C0"/>
  <text x="450" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="white">key</text>
  <text x="560" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="white">value</text>
  <!-- rows -->
  <line x1="505" y1="74" x2="505" y2="168" stroke="#CFD8DC" stroke-width="1"/>
  <text x="430" y="96" font-size="12" font-family="monospace" fill="#333">type</text>
  <text x="520" y="96" font-size="12" font-family="monospace" fill="#333">"login"</text>
  <line x1="385" y1="103" x2="635" y2="103" stroke="#ECEFF1" stroke-width="1"/>
  <text x="430" y="123" font-size="12" font-family="monospace" fill="#333">user</text>
  <text x="520" y="123" font-size="12" font-family="monospace" fill="#333">"alice"</text>
  <line x1="385" y1="130" x2="635" y2="130" stroke="#ECEFF1" stroke-width="1"/>
  <text x="430" y="150" font-size="12" font-family="monospace" fill="#333">ip</text>
  <text x="520" y="150" font-size="12" font-family="monospace" fill="#333">"1.2.3.4"</text>

  <!-- Label -->
  <text x="680" y="100" font-size="12" fill="#1565C0" font-weight="bold">3 Zeilen</text>
  <text x="680" y="118" font-size="11" fill="#555">eine pro</text>
  <text x="680" y="133" font-size="11" fill="#555">Key-Value</text>

  <!-- === BOTTOM SECTION: jsonb_array_elements === -->

  <!-- Source JSON array -->
  <rect x="20" y="185" width="190" height="90" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="115" y="203" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">JSON-Array</text>
  <text x="32" y="221" font-size="12" font-family="monospace" fill="#212121">payload-&gt;'items'</text>
  <text x="32" y="241" font-size="14" font-family="monospace" fill="#0288D1">  [1, 2, 3]</text>
  <text x="32" y="262" font-size="11" fill="#666">3 Elemente</text>

  <!-- Function label -->
  <rect x="225" y="216" width="145" height="30" rx="6" fill="#FF9800"/>
  <text x="298" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">jsonb_array_elements()</text>

  <!-- Arrow -->
  <line x1="210" y1="230" x2="225" y2="231" stroke="#FF9800" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="370" y1="231" x2="385" y2="231" stroke="#FF9800" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Result table for jsonb_array_elements -->
  <rect x="385" y="190" width="120" height="112" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5"/>
  <rect x="385" y="190" width="120" height="24" rx="8" fill="#FF9800"/>
  <rect x="385" y="208" width="120" height="6" fill="#FF9800"/>
  <text x="445" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="white">item</text>
  <text x="445" y="237" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">1</text>
  <line x1="385" y1="244" x2="505" y2="244" stroke="#ECEFF1" stroke-width="1"/>
  <text x="445" y="264" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">2</text>
  <line x1="385" y1="271" x2="505" y2="271" stroke="#ECEFF1" stroke-width="1"/>
  <text x="445" y="291" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">3</text>

  <!-- Label -->
  <text x="524" y="240" font-size="12" fill="#FF9800" font-weight="bold">3 Zeilen</text>
  <text x="524" y="258" font-size="11" fill="#555">eine pro</text>
  <text x="524" y="273" font-size="11" fill="#555">Array-Element</text>
</svg>
