<svg viewBox="0 0 520 265" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
  </marker>
</defs>
<text x="260" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">Sparse Index: Selektive Indizierung</text>
<!-- LEFT: Basistabelle -->
<text x="115" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#455A64">Basistabelle (6 Items)</text>
<rect x="10" y="47" width="230" height="165" rx="5" fill="#FAFAFA" stroke="#888" stroke-width="1.5"/>
<!-- Header -->
<rect x="10" y="47" width="230" height="22" rx="5" fill="#455A64"/>
<text x="70" y="62" text-anchor="middle" font-size="9" fill="white" font-weight="bold">PK</text>
<text x="150" y="62" text-anchor="middle" font-size="9" fill="white" font-weight="bold">SK</text>
<text x="215" y="62" text-anchor="middle" font-size="9" fill="#FFF9C4" font-weight="bold">ExpiresAt</text>
<line x1="115" y1="47" x2="115" y2="212" stroke="#CCC" stroke-width="1"/>
<line x1="185" y1="47" x2="185" y2="212" stroke="#CCC" stroke-width="1"/>
<!-- Row 1: has ExpiresAt (orange) -->
<rect x="10" y="69" width="230" height="22" fill="#FFF3E0"/>
<text x="62" y="84" text-anchor="middle" font-size="9" fill="#E65100" font-weight="bold">SESSION#S-01</text>
<text x="150" y="84" text-anchor="middle" font-size="9" fill="#555">META</text>
<text x="215" y="84" text-anchor="middle" font-size="9" fill="#E65100" font-weight="bold">2024-02-01</text>
<!-- Row 2: no ExpiresAt -->
<rect x="10" y="91" width="230" height="22" fill="#FFF"/>
<text x="62" y="106" text-anchor="middle" font-size="9" fill="#555">USER#Alice</text>
<text x="150" y="106" text-anchor="middle" font-size="9" fill="#555">PROFILE</text>
<text x="215" y="106" text-anchor="middle" font-size="9" fill="#CCC">—</text>
<!-- Row 3: has ExpiresAt (orange) -->
<rect x="10" y="113" width="230" height="22" fill="#FFF3E0"/>
<text x="62" y="128" text-anchor="middle" font-size="9" fill="#E65100" font-weight="bold">SESSION#S-02</text>
<text x="150" y="128" text-anchor="middle" font-size="9" fill="#555">META</text>
<text x="215" y="128" text-anchor="middle" font-size="9" fill="#E65100" font-weight="bold">2024-02-03</text>
<!-- Row 4: no ExpiresAt -->
<rect x="10" y="135" width="230" height="22" fill="#FFF"/>
<text x="62" y="150" text-anchor="middle" font-size="9" fill="#555">USER#Bob</text>
<text x="150" y="150" text-anchor="middle" font-size="9" fill="#555">PROFILE</text>
<text x="215" y="150" text-anchor="middle" font-size="9" fill="#CCC">—</text>
<!-- Row 5: no ExpiresAt -->
<rect x="10" y="157" width="230" height="22" fill="#FFF"/>
<text x="62" y="172" text-anchor="middle" font-size="9" fill="#555">PRODUCT#P-01</text>
<text x="150" y="172" text-anchor="middle" font-size="9" fill="#555">META</text>
<text x="215" y="172" text-anchor="middle" font-size="9" fill="#CCC">—</text>
<!-- Row 6: no ExpiresAt -->
<rect x="10" y="179" width="230" height="22" fill="#FFF"/>
<text x="62" y="194" text-anchor="middle" font-size="9" fill="#555">ORDER#O-01</text>
<text x="150" y="194" text-anchor="middle" font-size="9" fill="#555">META</text>
<text x="215" y="194" text-anchor="middle" font-size="9" fill="#CCC">—</text>
<!-- Arrow -->
<line x1="260" y1="135" x2="292" y2="135" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<text x="276" y="127" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">GSI</text>
<text x="276" y="148" text-anchor="middle" font-size="9" fill="#555">nur Rows</text>
<text x="276" y="160" text-anchor="middle" font-size="9" fill="#555">mit Wert</text>
<!-- RIGHT: Sparse GSI -->
<text x="410" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Sparse GSI (nur 2 Items)</text>
<rect x="295" y="47" width="215" height="165" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<!-- Header -->
<rect x="295" y="47" width="215" height="22" rx="5" fill="#E65100"/>
<text x="370" y="62" text-anchor="middle" font-size="9" fill="white" font-weight="bold">ExpiresAt (GSI PK)</text>
<text x="463" y="62" text-anchor="middle" font-size="9" fill="white" font-weight="bold">PK</text>
<line x1="420" y1="47" x2="420" y2="212" stroke="#CCC" stroke-width="1"/>
<!-- GSI Row 1 -->
<rect x="295" y="69" width="215" height="35" fill="#FFECB3"/>
<text x="357" y="87" text-anchor="middle" font-size="9" fill="#E65100" font-weight="bold">2024-02-01</text>
<text x="460" y="87" text-anchor="middle" font-size="9" fill="#555">SESSION#S-01</text>
<!-- GSI Row 2 -->
<rect x="295" y="104" width="215" height="35" fill="#FFECB3"/>
<text x="357" y="122" text-anchor="middle" font-size="9" fill="#E65100" font-weight="bold">2024-02-03</text>
<text x="460" y="122" text-anchor="middle" font-size="9" fill="#555">SESSION#S-02</text>
<!-- Empty rows visual -->
<text x="405" y="158" text-anchor="middle" font-size="20" fill="#EEE">—</text>
<text x="405" y="185" text-anchor="middle" font-size="20" fill="#EEE">—</text>
<!-- Benefit box -->
<rect x="295" y="222" width="215" height="36" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="402" y="237" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">Nur 2 von 6 Items im GSI</text>
<text x="402" y="251" text-anchor="middle" font-size="10" fill="#555">Query "bald ablaufend" = effizient</text>
<!-- Basistabelle note -->
<text x="115" y="225" text-anchor="middle" font-size="10" fill="#555">Items ohne ExpiresAt</text>
<text x="115" y="238" text-anchor="middle" font-size="10" fill="#555">werden ignoriert</text>
</svg>
