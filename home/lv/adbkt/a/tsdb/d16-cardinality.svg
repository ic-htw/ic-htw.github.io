<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 222" font-family="Arial, sans-serif">

  <!-- ── Header ── -->
  <text x="12" y="12" font-size="10" fill="#6b7280">Kreuzprodukt indizierter Tags (IoT-Beispiel):</text>

  <!-- ── Tag boxes (y=18–80) ── -->
  <!-- Box 1: equipment_id -->
  <rect x="12"  y="18" width="148" height="62" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="86"  y="36" text-anchor="middle" font-size="10.5" fill="#1e40af" font-weight="bold">equipment_id</text>
  <rect x="26"  y="41" width="120" height="28" fill="#2563eb" rx="4"/>
  <text x="86"  y="60" text-anchor="middle" font-size="17" fill="white"  font-weight="bold">10.000</text>
  <text x="86"  y="92" text-anchor="middle" font-size="9"   fill="#6b7280">eindeutige Werte</text>

  <!-- × -->
  <text x="168" y="58" text-anchor="middle" font-size="24" fill="#374151" font-weight="bold">×</text>

  <!-- Box 2: sensor_id -->
  <rect x="183" y="18" width="130" height="62" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="248" y="36" text-anchor="middle" font-size="10.5" fill="#1e40af" font-weight="bold">sensor_id</text>
  <rect x="198" y="41" width="100" height="28" fill="#2563eb" rx="4"/>
  <text x="248" y="60" text-anchor="middle" font-size="17" fill="white"  font-weight="bold">100</text>
  <text x="248" y="92" text-anchor="middle" font-size="9"   fill="#6b7280">eindeutige Werte</text>

  <!-- × -->
  <text x="321" y="58" text-anchor="middle" font-size="24" fill="#374151" font-weight="bold">×</text>

  <!-- Box 3: firmware -->
  <rect x="336" y="18" width="130" height="62" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="401" y="36" text-anchor="middle" font-size="10.5" fill="#1e40af" font-weight="bold">firmware</text>
  <rect x="351" y="41" width="100" height="28" fill="#2563eb" rx="4"/>
  <text x="401" y="60" text-anchor="middle" font-size="17" fill="white"  font-weight="bold">10</text>
  <text x="401" y="92" text-anchor="middle" font-size="9"   fill="#6b7280">eindeutige Werte</text>

  <!-- × -->
  <text x="474" y="58" text-anchor="middle" font-size="24" fill="#374151" font-weight="bold">×</text>

  <!-- Box 4: site -->
  <rect x="489" y="18" width="130" height="62" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="554" y="36" text-anchor="middle" font-size="10.5" fill="#1e40af" font-weight="bold">site</text>
  <rect x="504" y="41" width="100" height="28" fill="#2563eb" rx="4"/>
  <text x="554" y="60" text-anchor="middle" font-size="17" fill="white"  font-weight="bold">100</text>
  <text x="554" y="92" text-anchor="middle" font-size="9"   fill="#6b7280">eindeutige Werte</text>

  <!-- ── Downward arrow ── -->
  <line x1="350" y1="99"  x2="350" y2="112" stroke="#374151" stroke-width="2"/>
  <polygon points="345,112 350,121 355,112" fill="#374151"/>

  <!-- ── Result box ── -->
  <rect x="80" y="123" width="540" height="52" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
  <text x="350" y="141" text-anchor="middle" font-size="11" fill="#6b7280">10.000 × 100 × 10 × 100 =</text>
  <text x="350" y="165" text-anchor="middle" font-size="20" fill="#dc2626" font-weight="bold">1.000.000.000 eindeutige Zeitreihen</text>

  <!-- ── Bottom warning boxes ── -->
  <!-- GPS / continuous tag -->
  <rect x="12"  y="184" width="325" height="34" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="174" y="200" text-anchor="middle" font-size="11"   fill="#92400e" font-weight="bold">GPS (lat, long) als Tag → Kardinalität = ∞</text>
  <text x="174" y="213" text-anchor="middle" font-size="10"   fill="#92400e">Kontinuierliche Werte = unbegrenzt viele Zeitreihen</text>

  <!-- Index / RAM impact -->
  <rect x="347" y="184" width="341" height="34" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" rx="4"/>
  <text x="517" y="200" text-anchor="middle" font-size="11"   fill="#9a3412" font-weight="bold">Jede Zeitreihe = 1 Index-Eintrag im RAM</text>
  <text x="517" y="213" text-anchor="middle" font-size="10"   fill="#9a3412">Hohe Kardinalität → RAM-Erschöpfung möglich</text>

</svg>
