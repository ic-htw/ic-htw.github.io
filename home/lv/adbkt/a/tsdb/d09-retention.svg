<svg viewBox="0 0 520 215" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
  </marker>
</defs>
<rect x="12" y="42" width="103" height="100" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
<text x="63" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">Rohdaten</text>
<line x1="12" y1="68" x2="115" y2="68" stroke="#C62828" stroke-width="1" opacity="0.4"/>
<text x="63" y="85" text-anchor="middle" font-size="11" fill="#555">Auflösung:</text>
<text x="63" y="99" text-anchor="middle" font-size="11" fill="#555">1 Sekunde</text>
<text x="63" y="116" text-anchor="middle" font-size="11" fill="#555">7 Tage</text>
<text x="63" y="133" text-anchor="middle" font-size="10" fill="#C62828">580 MB/Tag</text>
<!-- Pfeil 1 -->
<line x1="115" y1="92" x2="143" y2="92" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 2: 5-min -->
<rect x="145" y="42" width="103" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<text x="196" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">5-min Avg</text>
<line x1="145" y1="68" x2="248" y2="68" stroke="#E65100" stroke-width="1" opacity="0.4"/>
<text x="196" y="85" text-anchor="middle" font-size="11" fill="#555">Auflösung:</text>
<text x="196" y="99" text-anchor="middle" font-size="11" fill="#555">5 Minuten</text>
<text x="196" y="116" text-anchor="middle" font-size="11" fill="#555">30 Tage</text>
<text x="196" y="133" text-anchor="middle" font-size="10" fill="#E65100">12 MB/Tag</text>
<!-- Pfeil 2 -->
<line x1="248" y1="92" x2="276" y2="92" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 3: 1-Stunden -->
<rect x="278" y="42" width="103" height="100" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
<text x="329" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">1-Std Avg</text>
<line x1="278" y1="68" x2="381" y2="68" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
<text x="329" y="85" text-anchor="middle" font-size="11" fill="#555">Auflösung:</text>
<text x="329" y="99" text-anchor="middle" font-size="11" fill="#555">1 Stunde</text>
<text x="329" y="116" text-anchor="middle" font-size="11" fill="#555">1 Jahr</text>
<text x="329" y="133" text-anchor="middle" font-size="10" fill="#2E7D32">1 MB/Tag</text>
<!-- Pfeil 3 -->
<line x1="381" y1="92" x2="409" y2="92" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
<!-- Stage 4: Löschen -->
<rect x="411" y="42" width="97" height="100" rx="6" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="5,3"/>
<text x="459" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#9E9E9E">Löschen</text>
<line x1="411" y1="68" x2="508" y2="68" stroke="#9E9E9E" stroke-width="1" opacity="0.4"/>
<text x="459" y="90" text-anchor="middle" font-size="11" fill="#9E9E9E">Automatisch</text>
<text x="459" y="105" text-anchor="middle" font-size="11" fill="#9E9E9E">nach Ablauf</text>
<text x="459" y="120" text-anchor="middle" font-size="11" fill="#9E9E9E">der Retention</text>
<!-- Ergebnis -->
<text x="260" y="168" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Speicherersparnis: ~99,8% durch Downsampling</text>
</svg>
