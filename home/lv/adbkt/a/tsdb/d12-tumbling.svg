<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 215" font-family="Arial, sans-serif">

  <!-- ── Vertical grid lines at window boundaries ── -->
  <line x1="100" y1="8"  x2="100" y2="172" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="300" y1="8"  x2="300" y2="172" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="500" y1="8"  x2="500" y2="172" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="672" y1="8"  x2="672" y2="172" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ── Event stream line ── -->
  <text x="8" y="37" font-size="10" fill="#6b7280" writing-mode="lr">Ereignisstrom</text>
  <line x1="100" y1="34" x2="672" y2="34" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="672,29 682,34 672,39" fill="#9ca3af"/>

  <!-- Events W1 (green) -->
  <rect x="114" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="138" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="165" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="195" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="228" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="260" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="284" y="28" width="9" height="9" fill="#2e7d32" rx="1"/>

  <!-- Events W2 (teal) -->
  <rect x="316" y="28" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="345" y="28" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="380" y="28" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="420" y="28" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="462" y="28" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="485" y="28" width="9" height="9" fill="#00695c" rx="1"/>

  <!-- Events W3 (blue) -->
  <rect x="514" y="28" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="542" y="28" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="574" y="28" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="610" y="28" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="642" y="28" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="660" y="28" width="9" height="9" fill="#1565c0" rx="1"/>

  <!-- ── Window bars ── -->
  <rect x="100" y="52" width="200" height="40" fill="#43a047" rx="4" opacity="0.88"/>
  <text x="200" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Fenster 1  (0–10 s)</text>

  <rect x="300" y="52" width="200" height="40" fill="#00897b" rx="4" opacity="0.88"/>
  <text x="400" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Fenster 2  (10–20 s)</text>

  <rect x="500" y="52" width="172" height="40" fill="#1e88e5" rx="4" opacity="0.88"/>
  <text x="586" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Fenster 3  (20–30 s)</text>

  <!-- ── Downward arrows ── -->
  <line x1="200" y1="92" x2="200" y2="118" stroke="#555" stroke-width="1.5"/>
  <polygon points="195,118 200,127 205,118" fill="#555"/>

  <line x1="400" y1="92" x2="400" y2="118" stroke="#555" stroke-width="1.5"/>
  <polygon points="395,118 400,127 405,118" fill="#555"/>

  <line x1="586" y1="92" x2="586" y2="118" stroke="#555" stroke-width="1.5"/>
  <polygon points="581,118 586,127 591,118" fill="#555"/>

  <!-- ── Result boxes ── -->
  <rect x="120" y="127" width="160" height="34" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5" rx="4"/>
  <text x="200" y="149" text-anchor="middle" font-size="12.5" fill="#2e7d32" font-weight="bold">COUNT = 7</text>

  <rect x="320" y="127" width="160" height="34" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="4"/>
  <text x="400" y="149" text-anchor="middle" font-size="12.5" fill="#00695c" font-weight="bold">COUNT = 6</text>

  <rect x="506" y="127" width="160" height="34" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5" rx="4"/>
  <text x="586" y="149" text-anchor="middle" font-size="12.5" fill="#1565c0" font-weight="bold">COUNT = 6</text>

  <!-- ── Time axis ── -->
  <line x1="100" y1="183" x2="685" y2="183" stroke="#374151" stroke-width="1.5"/>
  <polygon points="685,178 695,183 685,188" fill="#374151"/>

  <line x1="100" y1="179" x2="100" y2="187" stroke="#374151" stroke-width="1.5"/>
  <line x1="300" y1="179" x2="300" y2="187" stroke="#374151" stroke-width="1.5"/>
  <line x1="500" y1="179" x2="500" y2="187" stroke="#374151" stroke-width="1.5"/>
  <line x1="672" y1="179" x2="672" y2="187" stroke="#374151" stroke-width="1.5"/>

  <text x="100" y="202" text-anchor="middle" font-size="11" fill="#374151">0 s</text>
  <text x="300" y="202" text-anchor="middle" font-size="11" fill="#374151">10 s</text>
  <text x="500" y="202" text-anchor="middle" font-size="11" fill="#374151">20 s</text>
  <text x="672" y="202" text-anchor="middle" font-size="11" fill="#374151">30 s</text>
  <text x="697" y="187" font-size="11" fill="#374151">Zeit</text>

</svg>
