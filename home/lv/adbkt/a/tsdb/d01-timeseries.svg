<svg viewBox="0 0 520 270" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<text x="260" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">Zeitreihe: CPU-Auslastung (24 Stunden)</text>
<!-- Grid -->
<line x1="60" y1="55" x2="490" y2="55" stroke="#eee" stroke-width="1"/>
<line x1="60" y1="95" x2="490" y2="95" stroke="#eee" stroke-width="1"/>
<line x1="60" y1="135" x2="490" y2="135" stroke="#eee" stroke-width="1"/>
<line x1="60" y1="175" x2="490" y2="175" stroke="#eee" stroke-width="1"/>
<line x1="168" y1="35" x2="168" y2="215" stroke="#eee" stroke-width="1"/>
<line x1="275" y1="35" x2="275" y2="215" stroke="#eee" stroke-width="1"/>
<line x1="383" y1="35" x2="383" y2="215" stroke="#eee" stroke-width="1"/>
<!-- Axes -->
<line x1="60" y1="215" x2="490" y2="215" stroke="#333" stroke-width="2"/>
<line x1="60" y1="35" x2="60" y2="215" stroke="#333" stroke-width="2"/>
<!-- Y-axis labels -->
<text x="54" y="219" text-anchor="end" font-size="10" fill="#555">0%</text>
<text x="54" y="179" text-anchor="end" font-size="10" fill="#555">25%</text>
<text x="54" y="139" text-anchor="end" font-size="10" fill="#555">50%</text>
<text x="54" y="99" text-anchor="end" font-size="10" fill="#555">75%</text>
<text x="54" y="59" text-anchor="end" font-size="10" fill="#555">100%</text>
<!-- X-axis labels: 13 Punkte alle 2 Stunden -->
<text x="60" y="230" text-anchor="middle" font-size="10" fill="#555">00:00</text>
<text x="168" y="230" text-anchor="middle" font-size="10" fill="#555">06:00</text>
<text x="275" y="230" text-anchor="middle" font-size="10" fill="#555">12:00</text>
<text x="383" y="230" text-anchor="middle" font-size="10" fill="#555">18:00</text>
<text x="490" y="230" text-anchor="middle" font-size="10" fill="#555">24:00</text>
<!-- Werte: 10,9,8,12,35,62,68,65,58,45,30,18,12 -->
<!-- y = 215 - (val/100)*160 -->
<!-- x: 60 + i*(430/12) -->
<!-- Fläche unter der Kurve -->
<polygon points="60,199 96,201 132,202 168,196 203,159 239,116 275,106 311,111 347,122 383,143 418,167 454,186 490,196 490,215 60,215" fill="#BBDEFB" opacity="0.5"/>
<!-- Datenlinie -->
<polyline points="60,199 96,201 132,202 168,196 203,159 239,116 275,106 311,111 347,122 383,143 418,167 454,186 490,196" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<!-- Datenpunkte (Beispiele) -->
<circle cx="60" cy="199" r="3" fill="#1565C0"/>
<circle cx="168" cy="196" r="3" fill="#1565C0"/>
<circle cx="383" cy="143" r="3" fill="#1565C0"/>
<circle cx="490" cy="196" r="3" fill="#1565C0"/>
<!-- Tageshöchstwert -->
<circle cx="275" cy="106" r="5" fill="#E53935"/>
<line x1="275" y1="106" x2="320" y2="68" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="324" y="63" font-size="11" fill="#E53935" font-weight="bold">Tageshöchstwert: 68%</text>
<text x="324" y="77" font-size="10" fill="#E53935">12:00 Uhr</text>
<!-- Achsenbeschriftung -->
<text x="20" y="135" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,20,135)">CPU-Auslastung</text>
<text x="275" y="250" text-anchor="middle" font-size="11" fill="#777">Jeder Datenpunkt: (Zeitstempel, Messwert-Tupel)</text>
</svg>
