<svg viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<!-- IoT & Sensorik -->
<rect x="20" y="42" width="153" height="95" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
<text x="96" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">IoT &amp; Sensorik</text>
<line x1="20" y1="75" x2="173" y2="75" stroke="#1565C0" stroke-width="1" opacity="0.4"/>
<text x="96" y="95" text-anchor="middle" font-size="11" fill="#555">Temperatur, Druck, Feuchte</text>
<text x="96" y="112" text-anchor="middle" font-size="11" fill="#555">Smart Devices, Wearables</text>
<text x="96" y="129" text-anchor="middle" font-size="10" fill="#888">Millionen Geräte gleichzeitig</text>
<!-- IT-Monitoring -->
<rect x="184" y="42" width="153" height="95" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
<text x="260" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">IT-Monitoring</text>
<line x1="184" y1="75" x2="337" y2="75" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
<text x="260" y="95" text-anchor="middle" font-size="11" fill="#555">CPU, RAM, Netzwerk</text>
<text x="260" y="112" text-anchor="middle" font-size="11" fill="#555">Latenz, Fehlerrate</text>
<text x="260" y="129" text-anchor="middle" font-size="10" fill="#888">Alerting bei Anomalien</text>
<!-- Finanzmärkte -->
<rect x="348" y="42" width="153" height="95" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<text x="424" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Finanzmärkte</text>
<line x1="348" y1="75" x2="501" y2="75" stroke="#E65100" stroke-width="1" opacity="0.4"/>
<text x="424" y="95" text-anchor="middle" font-size="11" fill="#555">Aktienkurse, Volumen</text>
<text x="424" y="112" text-anchor="middle" font-size="11" fill="#555">Tick-Daten, Währungen</text>
<text x="424" y="129" text-anchor="middle" font-size="10" fill="#888">Mikrosekunden-Präzision</text>
<!-- Zeile 2 -->
<!-- DevOps -->
<rect x="20" y="155" width="153" height="95" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
<text x="96" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#7B1FA2">DevOps</text>
<line x1="20" y1="188" x2="173" y2="188" stroke="#7B1FA2" stroke-width="1" opacity="0.4"/>
<text x="96" y="208" text-anchor="middle" font-size="11" fill="#555">App-Metriken, Traces</text>
<text x="96" y="225" text-anchor="middle" font-size="11" fill="#555">Deployment-Events</text>
<text x="96" y="242" text-anchor="middle" font-size="10" fill="#888">SLO/SLA-Überwachung</text>
<!-- Energie -->
<rect x="184" y="155" width="153" height="95" rx="6" fill="#FFF8E1" stroke="#F57F17" stroke-width="2"/>
<text x="260" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17">Energieversorgung</text>
<line x1="184" y1="188" x2="337" y2="188" stroke="#F57F17" stroke-width="1" opacity="0.4"/>
<text x="260" y="208" text-anchor="middle" font-size="11" fill="#555">Stromverbrauch, Lastgraph</text>
<text x="260" y="225" text-anchor="middle" font-size="11" fill="#555">Solarertrag, Windkraft</text>
<text x="260" y="242" text-anchor="middle" font-size="10" fill="#888">Smart Grid Steuerung</text>
<!-- Gesundheitswesen -->
<rect x="348" y="155" width="153" height="95" rx="6" fill="#E0F7FA" stroke="#00695C" stroke-width="2"/>
<text x="424" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">Gesundheitswesen</text>
<line x1="348" y1="188" x2="501" y2="188" stroke="#00695C" stroke-width="1" opacity="0.4"/>
<text x="424" y="208" text-anchor="middle" font-size="11" fill="#555">EKG, Blutdruck, SpO2</text>
<text x="424" y="225" text-anchor="middle" font-size="11" fill="#555">Patientenmonitoring</text>
<text x="424" y="242" text-anchor="middle" font-size="10" fill="#888">Echtzeit-Alarme</text>
</svg>
