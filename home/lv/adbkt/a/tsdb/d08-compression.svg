<svg viewBox="0 0 520 275" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
  </marker>
</defs>
<!-- Trennlinie Mitte -->
<line x1="260" y1="38" x2="260" y2="240" stroke="#EEE" stroke-width="1.5"/>
<!-- LINKS: Timestamps – Delta-of-Delta -->
<text x="130" y="44" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Timestamps: Delta-of-Delta</text>
<!-- Rohdaten -->
<rect x="15" y="52" width="228" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="129" y="72" text-anchor="middle" font-size="10" fill="#333">Roh:  1000000000  1000000060  1000000120</text>
<!-- Pfeil + Delta -->
<line x1="129" y1="82" x2="129" y2="97" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="15" y="98" width="228" height="30" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="129" y="118" text-anchor="middle" font-size="11" fill="#333">Δ:         60        60        60</text>
<!-- Pfeil + Delta-of-delta -->
<line x1="129" y1="128" x2="129" y2="143" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="15" y="144" width="228" height="30" rx="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>
<text x="129" y="164" text-anchor="middle" font-size="11" fill="#1B5E20">ΔΔ:                 0             0</text>
<!-- Ergebnis links -->
<rect x="15" y="192" width="228" height="40" rx="5" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
<text x="129" y="210" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Speicherbedarf: 1–2 Bits</text>
<text x="129" y="225" text-anchor="middle" font-size="10" fill="#E8F5E9">statt 8 Bytes pro Zeitstempel</text>
<!-- RECHTS: Float-Werte – Gorilla / XOR -->
<text x="390" y="44" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Float-Werte: Gorilla / XOR</text>
<!-- Rohdaten -->
<rect x="277" y="52" width="228" height="30" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
<text x="391" y="72" text-anchor="middle" font-size="11" fill="#333">Roh:  23.5    23.5    23.6    23.5</text>
<!-- Pfeil -->
<line x1="391" y1="82" x2="391" y2="97" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- XOR Ergebnis -->
<rect x="277" y="98" width="228" height="30" rx="4" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
<text x="391" y="118" text-anchor="middle" font-size="11" fill="#333">XOR:    0x00    0x02    0x01</text>
<!-- Pfeil -->
<line x1="391" y1="128" x2="391" y2="143" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- Bit-gepackt -->
<rect x="277" y="144" width="228" height="30" rx="4" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
<text x="391" y="164" text-anchor="middle" font-size="11" fill="#333">Wiederholungen: 0 Bits extra</text>
<!-- Ergebnis rechts -->
<rect x="277" y="192" width="228" height="40" rx="5" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
<text x="391" y="210" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Kompressionsrate: ~1,4 Bytes/Punkt</text>
<text x="391" y="225" text-anchor="middle" font-size="10" fill="#FFF3E0">statt 16 Bytes (8 Bytes Wert + 8 Zeit)</text>
<!-- Fußnote -->
</svg>
