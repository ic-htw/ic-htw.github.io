<svg viewBox="0 0 520 275" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
  </marker>
</defs>
<!-- Clients links -->
<rect x="10" y="113" width="88" height="42" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<text x="54" y="131" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Clients</text>
<text x="54" y="147" text-anchor="middle" font-size="10" fill="#555">Schreiben / Lesen</text>
<!-- Pfeil → Load Balancer -->
<line x1="98" y1="134" x2="126" y2="134" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
<!-- Load Balancer -->
<rect x="128" y="103" width="88" height="62" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<text x="172" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Load</text>
<text x="172" y="141" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Balancer</text>
<text x="172" y="157" text-anchor="middle" font-size="10" fill="#555">Round-Robin</text>
<!-- Pfeile → Nodes -->
<line x1="216" y1="118" x2="246" y2="82" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="216" y1="134" x2="246" y2="134" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="216" y1="150" x2="246" y2="185" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- Node 1 -->
<rect x="248" y="52" width="112" height="58" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="304" y="73" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">TSDB Node 1</text>
<text x="304" y="89" text-anchor="middle" font-size="10" fill="#555">Shard: Jan – Apr</text>
<text x="304" y="103" text-anchor="middle" font-size="10" fill="#777">8 Core / 32 GB RAM</text>
<!-- Node 2 -->
<rect x="248" y="105" width="112" height="58" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
<text x="304" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">TSDB Node 2</text>
<text x="304" y="142" text-anchor="middle" font-size="10" fill="#555">Shard: Mai – Aug</text>
<text x="304" y="156" text-anchor="middle" font-size="10" fill="#777">8 Core / 32 GB RAM</text>
<!-- Node 3 -->
<rect x="248" y="158" width="112" height="58" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="304" y="179" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">TSDB Node 3</text>
<text x="304" y="195" text-anchor="middle" font-size="10" fill="#555">Shard: Sep – Dez</text>
<text x="304" y="209" text-anchor="middle" font-size="10" fill="#777">8 Core / 32 GB RAM</text>
<!-- Pfeile → Object Storage -->
<line x1="360" y1="81" x2="390" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="360" y1="134" x2="390" y2="142" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="360" y1="187" x2="390" y2="165" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- Object Storage -->
<rect x="392" y="88" width="120" height="100" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
<text x="452" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Object Storage</text>
<line x1="397" y1="117" x2="507" y2="117" stroke="#7B1FA2" stroke-width="1" opacity="0.4"/>
<text x="452" y="134" text-anchor="middle" font-size="10" fill="#555">S3 / GCS / Azure</text>
<text x="452" y="149" text-anchor="middle" font-size="10" fill="#555">Langzeitarchiv</text>
<text x="452" y="164" text-anchor="middle" font-size="10" fill="#555">Petabyte-Skala</text>
<text x="452" y="179" text-anchor="middle" font-size="10" fill="#777">kostengünstig</text>
