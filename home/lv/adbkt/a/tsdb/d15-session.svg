<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 188" font-family="Arial, sans-serif">

  <!-- ── Timeout gap backgrounds ── -->
  <rect x="168" y="8"  width="72" height="88" fill="#f3f4f6" rx="2"/>
  <rect x="324" y="8"  width="72" height="88" fill="#f3f4f6" rx="2"/>


  <!-- ── Event stream ── -->
  <line x1="60" y1="22" x2="510" y2="22" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="510,17 520,22 510,27" fill="#9ca3af"/>
  <text x="10" y="26" font-size="9.5" fill="#6b7280">Strom</text>

  <!-- Events S1 (green) at t=1,3,6,9 → x=72,96,132,168 -->
  <rect x="68"  y="16" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="92"  y="16" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="128" y="16" width="9" height="9" fill="#2e7d32" rx="1"/>
  <rect x="164" y="16" width="9" height="9" fill="#2e7d32" rx="1"/>

  <!-- Events S2 (teal) at t=15,17,20,22 → x=240,264,300,324 -->
  <rect x="236" y="16" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="260" y="16" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="296" y="16" width="9" height="9" fill="#00695c" rx="1"/>
  <rect x="320" y="16" width="9" height="9" fill="#00695c" rx="1"/>

  <!-- Events S3 (blue) at t=28,30,33,35 → x=396,420,456,480 -->
  <rect x="392" y="16" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="416" y="16" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="452" y="16" width="9" height="9" fill="#1565c0" rx="1"/>
  <rect x="476" y="16" width="9" height="9" fill="#1565c0" rx="1"/>

  <!-- ── Session bars ── -->
  <!-- S1: x=72–168, width=96 -->
  <rect x="72"  y="38" width="96" height="38" fill="#43a047" rx="4" opacity="0.9"/>
  <text x="120" y="62" text-anchor="middle" font-size="11.5" fill="white" font-weight="bold">Session 1</text>

  <!-- S2: x=240–324, width=84 -->
  <rect x="240" y="38" width="84" height="38" fill="#00897b" rx="4" opacity="0.9"/>
  <text x="282" y="62" text-anchor="middle" font-size="11.5" fill="white" font-weight="bold">Session 2</text>

  <!-- S3: x=396–480, width=84 -->
  <rect x="396" y="38" width="84" height="38" fill="#1e88e5" rx="4" opacity="0.9"/>
  <text x="438" y="62" text-anchor="middle" font-size="11.5" fill="white" font-weight="bold">Session 3</text>

  <!-- ── Timeout annotation: double arrows in gap regions ── -->
  <!-- Gap 1: x=168 → x=240 -->
  <line x1="172" y1="94" x2="236" y2="94" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="168,90 159,94 168,98" fill="#9ca3af"/>
  <polygon points="240,90 249,94 240,98" fill="#9ca3af"/>
  <text x="204" y="108" text-anchor="middle" font-size="9.5" fill="#6b7280">Timeout = 5 min</text>

  <!-- Gap 2: x=324 → x=396 -->
  <line x1="328" y1="94" x2="392" y2="94" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="324,90 315,94 324,98" fill="#9ca3af"/>
  <polygon points="396,90 405,94 396,98" fill="#9ca3af"/>
  <text x="360" y="108" text-anchor="middle" font-size="9.5" fill="#6b7280">Timeout = 5 min</text>

  <!-- ── Session duration annotations ── -->
  <!-- S1: x=72–168, 8 min -->
  <line x1="72"  y1="122" x2="168" y2="122" stroke="#43a047" stroke-width="1.5"/>
  <polygon points="72,118 63,122 72,126"   fill="#43a047"/>
  <polygon points="168,118 177,122 168,126" fill="#43a047"/>
  <text x="120" y="135" text-anchor="middle" font-size="9" fill="#2e7d32">8 min</text>

  <!-- S2: x=240–324, 7 min -->
  <line x1="240" y1="122" x2="324" y2="122" stroke="#00897b" stroke-width="1.5"/>
  <polygon points="240,118 231,122 240,126" fill="#00897b"/>
  <polygon points="324,118 333,122 324,126" fill="#00897b"/>
  <text x="282" y="135" text-anchor="middle" font-size="9" fill="#00695c">7 min</text>

  <!-- S3: x=396–480, 7 min -->
  <line x1="396" y1="122" x2="480" y2="122" stroke="#1e88e5" stroke-width="1.5"/>
  <polygon points="396,118 387,122 396,126" fill="#1e88e5"/>
  <polygon points="480,118 489,122 480,126" fill="#1e88e5"/>
  <text x="438" y="135" text-anchor="middle" font-size="9" fill="#1565c0">7 min</text>

  <!-- ── Time axis ── -->
  <line x1="60" y1="155" x2="518" y2="155" stroke="#374151" stroke-width="1.5"/>
  <polygon points="518,150 528,155 518,160" fill="#374151"/>

  <line x1="60"  y1="151" x2="60"  y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="120" y1="151" x2="120" y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="180" y1="151" x2="180" y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="240" y1="151" x2="240" y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="300" y1="151" x2="300" y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="360" y1="151" x2="360" y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="420" y1="151" x2="420" y2="159" stroke="#374151" stroke-width="1.5"/>
  <line x1="480" y1="151" x2="480" y2="159" stroke="#374151" stroke-width="1.5"/>

  <text x="60"  y="172" text-anchor="middle" font-size="10" fill="#374151">0</text>
  <text x="120" y="172" text-anchor="middle" font-size="10" fill="#374151">5</text>
  <text x="180" y="172" text-anchor="middle" font-size="10" fill="#374151">10</text>
  <text x="240" y="172" text-anchor="middle" font-size="10" fill="#374151">15</text>
  <text x="300" y="172" text-anchor="middle" font-size="10" fill="#374151">20</text>
  <text x="360" y="172" text-anchor="middle" font-size="10" fill="#374151">25</text>
  <text x="420" y="172" text-anchor="middle" font-size="10" fill="#374151">30</text>
  <text x="480" y="172" text-anchor="middle" font-size="10" fill="#374151">35</text>
  <text x="533" y="159" font-size="10" fill="#374151">min</text>

</svg>
