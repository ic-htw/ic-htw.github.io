<text x="160" y="150" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="bold">Embeddings:</text>
<text x="126" y="165" font-size="9" fill="#555">• Node2Vec</text>
<text x="126" y="178" font-size="9" fill="#555">• DeepWalk</text>
