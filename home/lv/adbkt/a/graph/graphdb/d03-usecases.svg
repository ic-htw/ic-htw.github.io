<svg viewBox="0 0 520 270" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
<!-- Social Network -->
<rect x="20" y="35" width="145" height="95" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<text x="92" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Soziale Netzwerke</text>
<!-- mini graph -->
<circle cx="65" cy="90" r="8" fill="#1565C0"/><circle cx="92" cy="75" r="8" fill="#1565C0"/>
<circle cx="120" cy="90" r="8" fill="#1565C0"/><circle cx="92" cy="105" r="8" fill="#1565C0"/>
<line x1="65" y1="90" x2="92" y2="75" stroke="#1565C0" stroke-width="1.5"/>
<line x1="92" y1="75" x2="120" y2="90" stroke="#1565C0" stroke-width="1.5"/>
<line x1="65" y1="90" x2="92" y2="105" stroke="#1565C0" stroke-width="1.5"/>
<line x1="120" y1="90" x2="92" y2="105" stroke="#1565C0" stroke-width="1.5"/>
<line x1="65" y1="90" x2="120" y2="90" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="92" y="122" text-anchor="middle" font-size="10" fill="#1565C0">Freunde, Empfehlungen</text>

<!-- Fraud Detection -->
<rect x="188" y="35" width="145" height="95" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
<text x="260" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">Betrugserkennung</text>
<!-- mini: ring network -->
<circle cx="230" cy="88" r="8" fill="#C62828"/>
<circle cx="260" cy="73" r="8" fill="#C62828"/>
<circle cx="290" cy="88" r="8" fill="#C62828"/>
<circle cx="260" cy="103" r="8" fill="#EF9A9A"/>
<line x1="230" y1="88" x2="260" y2="73" stroke="#C62828" stroke-width="1.5"/>
<line x1="260" y1="73" x2="290" y2="88" stroke="#C62828" stroke-width="1.5"/>
<line x1="230" y1="88" x2="260" y2="103" stroke="#C62828" stroke-width="1.5"/>
<line x1="290" y1="88" x2="260" y2="103" stroke="#C62828" stroke-width="1.5"/>
<line x1="230" y1="88" x2="290" y2="88" stroke="#E53935" stroke-width="2" stroke-dasharray="4,2"/>
<text x="260" y="122" text-anchor="middle" font-size="10" fill="#C62828">Ring-Netzwerke, Muster</text>

<!-- Knowledge Graph -->
<rect x="356" y="35" width="145" height="95" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="428" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Knowledge Graphs</text>
<ellipse cx="395" cy="87" rx="22" ry="13" fill="#2E7D32"/>
<text x="395" y="91" text-anchor="middle" font-size="8" fill="white">Entität</text>
<ellipse cx="450" cy="75" rx="22" ry="13" fill="#388E3C"/>
<text x="450" y="79" text-anchor="middle" font-size="8" fill="white">Konzept</text>
<ellipse cx="450" cy="103" rx="22" ry="13" fill="#388E3C"/>
<text x="450" y="107" text-anchor="middle" font-size="8" fill="white">Fakt</text>
<line x1="417" y1="85" x2="428" y2="79" stroke="#2E7D32" stroke-width="1.5"/>
<line x1="417" y1="89" x2="428" y2="100" stroke="#2E7D32" stroke-width="1.5"/>
<text x="428" y="122" text-anchor="middle" font-size="10" fill="#2E7D32">Google, Wikidata</text>

<!-- Routing / Navigation -->
<rect x="20" y="150" width="145" height="95" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
<text x="92" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Routing &amp; Navigation</text>
<circle cx="45" cy="205" r="6" fill="#E65100"/>
<circle cx="75" cy="190" r="6" fill="#E65100"/>
<circle cx="105" cy="205" r="6" fill="#E65100"/>
<circle cx="135" cy="200" r="6" fill="#E65100"/>
<line x1="45" y1="205" x2="75" y2="190" stroke="#FF6F00" stroke-width="2"/>
<line x1="75" y1="190" x2="105" y2="205" stroke="#FF6F00" stroke-width="2"/>
<line x1="105" y1="205" x2="135" y2="200" stroke="#FF6F00" stroke-width="2"/>
<line x1="45" y1="205" x2="105" y2="205" stroke="#FFB74D" stroke-width="1" stroke-dasharray="3,2"/>
<text x="92" y="235" text-anchor="middle" font-size="10" fill="#E65100">Kürzeste Pfade, Dijkstra</text>

<!-- Recommendation -->
<rect x="188" y="150" width="145" height="95" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
<text x="260" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#6A1B9A">Empfehlungssysteme</text>
<circle cx="230" cy="200" r="8" fill="#6A1B9A"/>
<rect x="248" y="192" width="18" height="12" rx="2" fill="#AB47BC"/>
<rect x="272" y="185" width="18" height="19" rx="2" fill="#AB47BC"/>
<rect x="296" y="192" width="18" height="12" rx="2" fill="#AB47BC"/>
<line x1="238" y1="198" x2="248" y2="198" stroke="#6A1B9A" stroke-width="1.5"/>
<line x1="238" y1="202" x2="272" y2="196" stroke="#6A1B9A" stroke-width="1.5"/>
<text x="260" y="235" text-anchor="middle" font-size="10" fill="#6A1B9A">User-Item-Graphen</text>

<!-- IT Infrastructure -->
<rect x="356" y="150" width="145" height="95" rx="8" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5"/>
<text x="428" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695C">IT-Infrastruktur</text>
<rect x="380" y="183" width="20" height="14" rx="2" fill="#00695C"/>
<rect x="415" y="183" width="20" height="14" rx="2" fill="#00695C"/>
<rect x="450" y="183" width="20" height="14" rx="2" fill="#00695C"/>
<rect x="397" y="210" width="20" height="14" rx="2" fill="#26A69A"/>
<rect x="432" y="210" width="20" height="14" rx="2" fill="#26A69A"/>
<line x1="390" y1="197" x2="407" y2="210" stroke="#00695C" stroke-width="1.5"/>
<line x1="425" y1="197" x2="425" y2="210" stroke="#00695C" stroke-width="1.5"/>
<line x1="460" y1="197" x2="442" y2="210" stroke="#00695C" stroke-width="1.5"/>
<line x1="390" y1="183" x2="415" y2="183" stroke="#00695C" stroke-width="1.5" stroke-dasharray="3,2"/>
<line x1="415" y1="183" x2="450" y2="183" stroke="#00695C" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="428" y="235" text-anchor="middle" font-size="10" fill="#00695C">Abhängigkeitsgraphen</text>
</svg>
