<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- Step 1: Partition Keys -->
  <text x="62" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Partition Keys</text>
  <rect x="15" y="26" width="95" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="62" y="42" text-anchor="middle" font-size="11" fill="#333">"sensor:s-001"</text>
  <rect x="15" y="56" width="95" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="62" y="72" text-anchor="middle" font-size="11" fill="#333">"sensor:s-002"</text>
  <rect x="15" y="86" width="95" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="62" y="102" text-anchor="middle" font-size="11" fill="#333">"sensor:s-003"</text>
  <rect x="15" y="116" width="95" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="62" y="132" text-anchor="middle" font-size="11" fill="#333">"sensor:s-004"</text>

  <!-- Step 2: Hash function -->
  <rect x="160" y="60" width="100" height="55" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="210" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Murmur3</text>
  <text x="210" y="100" text-anchor="middle" font-size="11" fill="#555">Hash-Funktion</text>

  <!-- Arrows left to hash -->
  <line x1="110" y1="38" x2="158" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="110" y1="68" x2="158" y2="85" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="110" y1="98" x2="158" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="110" y1="128" x2="158" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Tokens -->
  <text x="310" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#7B1FA2">Token (int64)</text>
  <rect x="275" y="26" width="75" height="24" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="312" y="42" text-anchor="middle" font-size="11" fill="#7B1FA2">-8200000000</text>
  <rect x="275" y="56" width="75" height="24" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="312" y="72" text-anchor="middle" font-size="11" fill="#7B1FA2">-1500000000</text>
  <rect x="275" y="86" width="75" height="24" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="312" y="102" text-anchor="middle" font-size="11" fill="#7B1FA2">+4300000000</text>
  <rect x="275" y="116" width="75" height="24" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="312" y="132" text-anchor="middle" font-size="11" fill="#7B1FA2">+7600000000</text>

  <!-- Arrows hash to tokens -->
  <line x1="261" y1="80" x2="273" y2="38" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="261" y1="85" x2="273" y2="68" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="261" y1="92" x2="273" y2="98" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="261" y1="105" x2="273" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Nodes -->
  <text x="450" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#388E3C">Node</text>
  <rect x="405" y="26" width="90" height="30" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="450" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#388E3C">Node A</text>

  <rect x="405" y="70" width="90" height="30" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#388E3C">Node B</text>

  <rect x="405" y="115" width="90" height="30" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#388E3C">Node C</text>

  <rect x="405" y="160" width="90" height="30" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="450" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#388E3C">Node D</text>

  <!-- Arrows tokens to nodes -->
  <line x1="351" y1="38" x2="403" y2="41" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="351" y1="68" x2="403" y2="82" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="351" y1="98" x2="403" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="351" y1="128" x2="403" y2="173" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
