<svg viewBox="0 0 520 330" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect x="10" y="10" width="500" height="310" rx="6" fill="#F5F5F5" stroke="#1565C0" stroke-width="2"/>
  <text x="260" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">NoSQL-Datenbanklandschaft</text>

  <!-- Key-Value -->
  <rect x="30" y="50" width="100" height="50" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="80" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Key-Value</text>
  <text x="80" y="88" text-anchor="middle" font-size="11" fill="#333">Redis, DynamoDB</text>

  <!-- Document -->
  <rect x="145" y="50" width="100" height="50" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="195" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#388E3C">Dokument</text>
  <text x="195" y="88" text-anchor="middle" font-size="11" fill="#333">MongoDB, Couchbase</text>

  <!-- Wide Column - highlighted -->
  <rect x="260" y="45" width="115" height="60" rx="5" fill="#FFF9C4" stroke="#F57F17" stroke-width="2.5"/>
  <text x="317" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Wide Column</text>
  <text x="317" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">★ Cassandra</text>
  <text x="317" y="98" text-anchor="middle" font-size="11" fill="#333">HBase, ScyllaDB</text>

  <!-- Graph -->
  <rect x="390" y="50" width="100" height="50" rx="5" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="440" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">Graph</text>
  <text x="440" y="88" text-anchor="middle" font-size="11" fill="#333">Neo4j, ArangoDB</text>

  <!-- Origins section -->
  <text x="260" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Herkunft &amp; Einflüsse</text>

  <!-- Amazon Dynamo -->
  <rect x="30" y="150" width="145" height="60" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="102" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Amazon Dynamo</text>
  <text x="102" y="187" text-anchor="middle" font-size="11" fill="#333">Peer-to-Peer</text>
  <text x="102" y="202" text-anchor="middle" font-size="11" fill="#333">Replikation, Ring</text>

  <!-- Google Bigtable -->
  <rect x="345" y="150" width="145" height="60" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="417" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#388E3C">Google Bigtable</text>
  <text x="417" y="187" text-anchor="middle" font-size="11" fill="#333">Wide Column</text>
  <text x="417" y="202" text-anchor="middle" font-size="11" fill="#333">Datenmodell</text>

  <!-- Cassandra center -->
  <ellipse cx="260" cy="200" rx="65" ry="35" fill="#E65100" opacity="0.15" stroke="#E65100" stroke-width="2"/>
  <text x="260" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Cassandra</text>
  <text x="260" y="212" text-anchor="middle" font-size="11" fill="#555">2008 Facebook</text>

  <!-- Arrows -->
  <line x1="175" y1="180" x2="193" y2="193" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="345" y1="180" x2="327" y2="193" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Properties row -->
  <rect x="30" y="255" width="100" height="45" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="80" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Open Source</text>
  <text x="80" y="289" text-anchor="middle" font-size="11" fill="#333">Apache License</text>

  <rect x="145" y="255" width="100" height="45" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="195" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Masterlos</text>
  <text x="195" y="289" text-anchor="middle" font-size="11" fill="#333">Peer-to-Peer</text>

  <rect x="260" y="255" width="100" height="45" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="310" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Skalierbar</text>
  <text x="310" y="289" text-anchor="middle" font-size="11" fill="#333">linear, horizontal</text>

  <rect x="375" y="255" width="115" height="45" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="432" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Hochverfügbar</text>
  <text x="432" y="289" text-anchor="middle" font-size="11" fill="#333">kein SPOF</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>
