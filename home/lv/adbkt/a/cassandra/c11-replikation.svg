<svg viewBox="0 0 520 310" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
  </defs>

  <!-- Ring (simplified, 5 nodes) -->
  <circle cx="190" cy="155" r="95" fill="none" stroke="#90CAF9" stroke-width="14" opacity="0.35"/>
  <circle cx="190" cy="155" r="95" fill="none" stroke="#1565C0" stroke-width="2"/>

  <!-- Client -->
  <rect x="40" y="20" width="70" height="35" rx="5" fill="#FFF9C4" stroke="#E65100" stroke-width="2"/>
  <text x="75" y="37" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Client</text>
  <text x="75" y="50" text-anchor="middle" font-size="9" fill="#555">Write Request</text>

  <!-- Coordinator node (top) - highlighted -->
  <circle cx="190" cy="62" r="26" fill="#E65100" stroke="#BF360C" stroke-width="2"/>
  <text x="190" y="59" text-anchor="middle" font-size="11" font-weight="bold" fill="white">N1</text>
  <text x="190" y="73" text-anchor="middle" font-size="8" fill="#FFE">Koordinator</text>

  <!-- Node 2 (top right) - Replica -->
  <circle cx="273" cy="105" r="24" fill="#388E3C" stroke="#1B5E20" stroke-width="2"/>
  <text x="273" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="white">N2</text>
  <text x="273" y="116" text-anchor="middle" font-size="8" fill="#CFC">Replica 1</text>

  <!-- Node 3 (right) - Replica -->
  <circle cx="283" cy="195" r="24" fill="#388E3C" stroke="#1B5E20" stroke-width="2"/>
  <text x="283" y="192" text-anchor="middle" font-size="11" font-weight="bold" fill="white">N3</text>
  <text x="283" y="206" text-anchor="middle" font-size="8" fill="#CFC">Replica 2</text>

  <!-- Node 4 (bottom) - non-replica -->
  <circle cx="190" cy="248" r="24" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <text x="190" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="white">N4</text>
  <text x="190" y="259" text-anchor="middle" font-size="8" fill="#BBD">—</text>

  <!-- Node 5 (left) - non-replica -->
  <circle cx="98" cy="195" r="24" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <text x="98" y="192" text-anchor="middle" font-size="11" font-weight="bold" fill="white">N5</text>
  <text x="98" y="206" text-anchor="middle" font-size="8" fill="#BBD">—</text>

  <!-- Client to Coordinator -->
  <line x1="110" y1="42" x2="165" y2="62" stroke="#E65100" stroke-width="2" marker-end="url(#arr)"/>
  <text x="127" y="38" font-size="9" fill="#E65100" font-weight="bold">Write</text>

  <!-- Coordinator to Replica 1 -->
  <line x1="214" y1="75" x2="251" y2="96" stroke="#388E3C" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="242" y="80" font-size="9" fill="#388E3C">RF=3</text>

  <!-- Coordinator to Replica 2 -->
  <line x1="211" y1="82" x2="265" y2="178" stroke="#388E3C" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Acknowledgements -->
  <line x1="249" y1="99" x2="215" y2="78" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrb)"/>
  <line x1="261" y1="180" x2="214" y2="85" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrb)"/>
  <text x="232" y="145" font-size="9" fill="#1565C0">ACK</text>

  <!-- Right info panel -->
  <rect x="335" y="15" width="175" height="285" rx="6" fill="#F5F5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="422" y="38" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Replikation</text>

  <!-- RF explanation -->
  <rect x="345" y="46" width="155" height="30" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="422" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#388E3C">RF = 3</text>
  <text x="422" y="72" text-anchor="middle" font-size="10" fill="#555">3 Kopien im Cluster</text>

  <text x="345" y="96" font-size="11" font-weight="bold" fill="#333">Ablauf</text>
  <text x="345" y="112" font-size="10" fill="#555">1. Client → Koordinator</text>
  <text x="345" y="128" font-size="10" fill="#555">2. Koordinator → RF Nodes</text>
  <text x="345" y="144" font-size="10" fill="#555">3. Replicas bestätigen</text>
  <text x="345" y="160" font-size="10" fill="#555">4. Koordinator → Client</text>

  <line x1="343" y1="170" x2="502" y2="170" stroke="#ddd" stroke-width="1"/>

  <text x="345" y="186" font-size="11" font-weight="bold" fill="#333">Strategien</text>
  <text x="345" y="202" font-size="10" fill="#1565C0">SimpleStrategy</text>
  <text x="345" y="216" font-size="10" fill="#555">Nächste RF Nodes im Ring</text>
  <text x="345" y="230" font-size="10" fill="#555">Single Datacenter</text>
  <text x="345" y="246" font-size="10" fill="#1565C0">NetworkTopologyStrategy</text>
  <text x="345" y="260" font-size="10" fill="#555">RF pro Datacenter</text>
  <text x="345" y="274" font-size="10" fill="#555">Rack-Awareness</text>
  <text x="345" y="288" font-size="10" fill="#388E3C">Empfohlen für Produktion</text>
</svg>
